version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: s1-gantt-db
    environment:
      POSTGRES_USER: gantt
      POSTGRES_PASSWORD: gantt_dev_pwd
      POSTGRES_DB: s1-gantt-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
