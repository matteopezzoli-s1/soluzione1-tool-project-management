name = "tpm-backend"
main = "src/worker.ts"
compatibility_date = "2026-07-06"
compatibility_flags = ["nodejs_compat"]

# `wrangler dev` legge le var non-segrete da qui; i secret (JWT_SECRET,
# GOOGLE_CLIENT_ID/SECRET, DATABASE_URL locale) vanno in .dev.vars (gitignored)
# per lo sviluppo locale e via `wrangler secret put` per il deploy.
[vars]
FRONTEND_URL = "http://localhost:5173"
BACKEND_URL = "http://localhost:8787"

# Config Hyperdrive verso il progetto Neon di produzione (s1-tpm-prod),
# creata con `wrangler hyperdrive create s1-tpm-prod --connection-string=...`.
# Vive solo sotto [env.production]: `wrangler dev` in locale non deve mai
# toccare il DB di produzione.
[env.production]
vars = { FRONTEND_URL = "https://tpm-frontend.pages.dev", BACKEND_URL = "https://tpm-backend-production.soluzione1.workers.dev" }

[[env.production.hyperdrive]]
binding = "HYPERDRIVE"
id = "542be3cf52d4415a97ba5f26618c1e43"
