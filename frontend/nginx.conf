# =============================================================================
# frontend/nginx.conf
# Configurazione Nginx per SPA React su Cloud Run (porta 8080)
#
# - Tutte le route non trovate come file statici → index.html (React Router)
# - Gzip abilitato per performance
# - Cloud Run richiede porta 8080
# =============================================================================

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Abilita compressione gzip
    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 1024;

    # Assets statici con cache lunga (Vite genera hash nel filename)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — tutte le route → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check per Cloud Run
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
