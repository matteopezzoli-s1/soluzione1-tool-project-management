# =============================================================================
# cloudbuild-frontend.yaml
# Pipeline CI/CD - Frontend React + Vite (servito da Nginx su Cloud Run)
#
# Trigger GCP:
#   - Branch: develop  → deploy su fe-dev  (VITE_API_URL punta a be-dev)
#   - Branch: main     → deploy su fe-prod (VITE_API_URL punta a be-prod)
#
# ⚠️  IMPORTANTE — Variabili VITE_ sono "baked" a BUILD TIME
#    Il bundle JS prodotto da `vite build` contiene già l'URL del backend
#    hardcoded. Ogni ambiente produce un'immagine Docker diversa.
#    Aggiorna i PLACEHOLDER con le URL reali dei tuoi Cloud Run backend.
#
# Prerequisiti:
#   - Artifact Registry repository "docker-images" già creato in europe-west1
#   - Service account Cloud Build con i ruoli necessari (vedi docs/gcp-setup.md)
# =============================================================================

substitutions:
  _REGION: europe-west1
  _PROJECT_ID: soluzione1-progetti-interni
  _AR_REPO: docker-images
  _IMAGE: europe-west1-docker.pkg.dev/soluzione1-progetti-interni/docker-images/frontend

  # ⚠️  PLACEHOLDER — Aggiorna con le URL reali una volta noti i Cloud Run BE
  # Formato: https://NOME-SERVICE-HASH-ew.a.run.app  oppure dominio custom
  _API_URL_DEV: https://PLACEHOLDER-be-dev-url.a.run.app
  _API_URL_PROD: https://PLACEHOLDER-be-prod-url.a.run.app

steps:

  # ---------------------------------------------------------------------------
  # STEP 1 — Build immagine Docker del frontend
  #          VITE_API_URL viene passato come build-arg (baked nel bundle JS)
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e

        # Seleziona VITE_API_URL in base al branch
        if [ "$BRANCH_NAME" = "main" ]; then
          API_URL="$_API_URL_PROD"
        else
          API_URL="$_API_URL_DEV"
        fi

        echo "▶ Build branch=$BRANCH_NAME → VITE_API_URL=$$API_URL"

        docker build \
          --file frontend/Dockerfile \
          --build-arg VITE_API_URL="$$API_URL" \
          --tag "$_IMAGE:$BRANCH_NAME-$SHORT_SHA" \
          --tag "$_IMAGE:$BRANCH_NAME-latest" \
          --cache-from "$_IMAGE:$BRANCH_NAME-latest" \
          frontend
    waitFor: ['-']

  # ---------------------------------------------------------------------------
  # STEP 2 — Push immagine su Artifact Registry
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args:
      - 'push'
      - '--all-tags'
      - '$_IMAGE'
    waitFor: ['build-frontend']

  # ---------------------------------------------------------------------------
  # STEP 3 — Deploy su Cloud Run (branch-aware)
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e

        # Seleziona servizio Cloud Run in base al branch
        if [ "$BRANCH_NAME" = "main" ]; then
          SERVICE="$_PROJECT_ID-fe-prod"
        else
          SERVICE="$_PROJECT_ID-fe-dev"
        fi

        echo "▶ Deploy branch=$BRANCH_NAME → service=$$SERVICE"

        gcloud run deploy "$$SERVICE" \
          --image "$_IMAGE:$BRANCH_NAME-$SHORT_SHA" \
          --region "$_REGION" \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --min-instances 0 \
          --max-instances 5 \
          --memory 256Mi \
          --cpu 1 \
          --timeout 30s

        echo "✅ Deploy completato: $$SERVICE"
    waitFor: ['push-frontend']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
